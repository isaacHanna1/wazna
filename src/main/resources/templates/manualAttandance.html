<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Management</title>
  <link rel="stylesheet" href="./css/manualAttendance.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link th:href="@{../../css/styles.css}" rel="stylesheet" />
  <link th:href="@{/css/common/toast.css}" rel="stylesheet"/>
</head>
<body>

<div id="toast-container"></div>
<div th:insert="~{fragments/navbar :: mainNavbar}"></div>

<div class="app">
  <main class="main">
    <div class="container">

      <!-- Top bar: meeting title + date -->
      <div class="top-bar">
        <div class="top-bar-left">
          <div class="meeting-dot"></div>
          <span class="meeting-label">Youth Leadership Workshop</span>
          <span class="meeting-sep">·</span>
          <span class="meeting-date-text" id="current-date" th:text="${currentDate}"></span>
        </div>
        <div class="top-bar-right">
              <span class="live-pill">
                <span class="live-dot"></span>
                Live
              </span>
        </div>
      </div>

      <!-- Two-column layout -->
      <div class="layout">

        <!-- LEFT: Take Attendance Panel -->
        <div class="panel panel-form">
          <div class="panel-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Take Attendance
          </div>

          <!-- Meeting Code -->
          <div class="field">
            <label class="field-label">Meeting Code</label>
            <div class="select-wrapper">
              <select id="meetingCode" name="meetingCode" class="field-input">
                <option value="" disabled selected>— Select QR Code —</option>
                <option th:each="code : ${codes}" th:value="${code}" th:text="${code}"></option>
              </select>
              <svg class="select-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <!-- QR Camera (conditional) -->
          <div class="camera-container" th:if="${isChildRegisterionExists}">
            <video id="camera-video" autoplay playsinline></video>
            <p id="scan-result-err" class="scan-hint">Scan a QR code to auto-fill meeting code</p>
            <div class="camera-btns">
              <button id="start-scan-btn" class="cam-btn cam-start">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                Start
              </button>
              <button id="stop-scan-btn" class="cam-btn cam-stop">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"/></svg>
                Stop
              </button>
            </div>
          </div>

          <!-- Search -->
          <div class="field">
            <label class="field-label">Search User</label>
            <div class="search-wrap">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="search-input" class="field-input search-input" placeholder="Phone number or name…"/>
              <ul id="suggestUsers" class="suggestUsers"></ul>
            </div>
          </div>

          <!-- User Display -->
          <div id="user-display" class="user-display empty">
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <p>Select a user to continue</p>
            </div>
          </div>

          <!-- Actions -->
          <div class="action-row">
            <button id="attendance-btn" class="btn btn-primary disabled" onclick="markPersent()" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/><circle cx="12" cy="8" r="6"/></svg>
              Mark Present
            </button>
            <button id="cancel-attendance-btn" class="btn btn-ghost" onclick="cancelAttendance()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              Cancel
            </button>
          </div>
        </div>

        <!-- RIGHT: Today's Attendance Table -->
        <div class="panel panel-table">
          <div class="panel-title-row">
            <div class="panel-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Today's Attendance
            </div>
            <div class="table-date">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span id="table-date"></span>
            </div>
          </div>

          <div class="table-scroll">
            <table class="att-table">
              <thead>
              <tr>
                <th class="col-sno hidden-mobile">#</th>
                <th class="col-id hidden-mobile">ID</th>
                <th class="col-name">Name</th>
                <th class="col-pts">Points</th>
                <th class="col-bal">Balance</th>
                <th class="col-time hidden-mobile">Time</th>
              </tr>
              </thead>
              <tbody id="attendance-tbody"></tbody>
              <input type="hidden" id="rowNum" value="1"/>
            </table>
            <div class="table-empty" id="table-empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <p>No attendees yet</p>
              <span>Marked attendees will appear here</span>
            </div>
          </div>
        </div>

      </div><!-- /layout -->
    </div>
  </main>
</div>

<script th:src="@{/js/nav.js}"></script>
<script th:src="@{/js/jCommon/Common.js}"></script>
<script th:src="@{/js/manualAttandance.js}"></script>
<script th:src="@{/js/jCommon/toast.js}"></script>
<script type="module" th:src="@{/js/QrReader.js}"></script>

<script>
  // Show/hide empty state based on tbody rows
  const tbody = document.getElementById('attendance-tbody');
  const emptyState = document.getElementById('table-empty-state');
  const observer = new MutationObserver(() => {
    emptyState.style.display = tbody.children.length > 0 ? 'none' : 'flex';
  });
  observer.observe(tbody, { childList: true });

  // Set today's date in table header
  const tableDate = document.getElementById('table-date');
  if (tableDate) {
    tableDate.textContent = new Date().toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  }
</script>
</body>
</html>
