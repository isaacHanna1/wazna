<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Quiz</title>
  <link th:href="@{/css/styles.css}" rel="stylesheet"/>
  <link th:href="@{/css/quiz.css}"   rel="stylesheet"/>
</head>
<body>

<div th:insert="~{fragments/navbar :: mainNavbar}"></div>

<input type="hidden" id="msg"      th:value="${msg}"/>
<input type="hidden" id="msg_type" th:value="${msg_type}"/>

<div class="auth-container has-navbar">
  <div class="auth-form">

    <!-- Header -->
    <div class="auth-form-header">
      <div class="auth-form-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9"  y1="15" x2="15" y2="15"/>
        </svg>
      </div>
      <div>
        <h2 class="auth-title">Create Quiz</h2>
        <p class="auth-subtitle">Fill in the details below to create a new quiz</p>
      </div>
    </div>

    <form>

      <!-- Title -->
      <div class="form-group">
        <label class="form-label" for="title">Quiz Title</label>
        <input class="form-input"
               type="text"
               id="title"
               placeholder="e.g. Sunday Bible Quiz"
               required/>
      </div>

      <!-- Quiz Type -->
      <div class="form-group">
        <label class="form-label" for="quizType">Quiz Type</label>
        <select class="form-input" id="quizType"  required>
          <option value="" disabled>Select type...</option>
        </select>
      </div>

      <!-- Quiz Status -->
      <div class="form-group">
        <label class="form-label" for="quizStatus">Status</label>
        <select class="form-input" id="quizStatus" required>
          <option value="" disabled>Select status...</option>
       
        </select>
      </div>

      <!-- Dates -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="startDate">Start Date</label>
          <input class="form-input"
                 type="date"
                 id="startDate"  />
        </div>
        <div class="form-group">
          <label class="form-label" for="endDate">End Date</label>
          <input class="form-input"
                 type="date"
                 id="endDate"/>
        </div>
      </div>


      <!-- Actions -->
      <div style="display:flex; gap:.75rem; margin-top:1.25rem">
        <a th:href="@{/dashboard/quiz/view}" class="btn btn-secondary" style="margin-top:0">
          Cancel
        </a>
        <button type="submit" class="btn btn-primary" style="margin-top:0">
          Create Quiz
        </button>
      </div>

    </form>
  </div>
</div>

<script th:src="@{/js/nav.js}"></script>
<script th:src="@{/js/jCommon/Common.js}"></script>


</body>
</html>
